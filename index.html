<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Görkem Yıldırım — Apps</title>
  <meta name="description" content="Mobile apps by Görkem Yıldırım, including Zikr — a calm, classic digital tasbih / dhikr counter." />
  <style>
    :root { --bg:#faf7f0; --ink:#2b2620; --muted:#7a7165; --line:#e7e0d3; --accent:#9a7b4f; --card:#fffdf8; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      line-height:1.6; -webkit-font-smoothing:antialiased; }
    .wrap { max-width:680px; margin:0 auto; padding:64px 24px 80px; }
    header { margin-bottom:48px; }
    h1 { font-size:28px; margin:0 0 6px; letter-spacing:-0.01em; }
    .sub { color:var(--muted); font-size:16px; margin:0; }
    section { margin-bottom:44px; }
    h2 { font-size:13px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted);
      margin:0 0 16px; font-weight:600; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:22px 24px; }
    .app-name { font-size:20px; font-weight:600; margin:0 0 4px; }
    .app-desc { color:var(--muted); margin:0 0 16px; font-size:15px; }
    .links a { display:inline-block; margin:0 14px 4px 0; font-size:14px; color:var(--accent);
      text-decoration:none; border-bottom:1px solid transparent; }
    .links a:hover { border-bottom-color:var(--accent); }
    .contact p { margin:4px 0; font-size:15px; }
    .contact a { color:var(--accent); text-decoration:none; }
    .contact a:hover { text-decoration:underline; }
    footer { margin-top:56px; padding-top:24px; border-top:1px solid var(--line); color:var(--muted); font-size:13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Görkem Yıldırım</h1>
      <p class="sub">Independent mobile app developer</p>
    </header>

    <section>
      <h2>Apps</h2>
      <div class="card">
        <p class="app-name">Zikr</p>
        <p class="app-desc">A calm, classic digital tasbih (dhikr counter). Live on the App Store.</p>
        <div class="links">
          <a href="https://gorkie.github.io/zikr-legal/">About Zikr</a>
          <a href="https://apps.apple.com/app/id6768684019">App Store</a>
        </div>
      </div>
    </section>

    <section class="contact">
      <h2>Contact</h2>
      <p>Support &amp; inquiries: <a href="mailto:gorkemyildirim@outlook.com">gorkemyildirim@outlook.com</a></p>
    </section>

    <footer>© 2026 Görkem Yıldırım. All rights reserved.</footer>
  </div>
</body>
</html>
